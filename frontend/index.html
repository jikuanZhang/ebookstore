<!DOCTYPE html>
<!-- 声明文档类型，告诉浏览器这是一个 HTML5 页面 -->

<html lang="zh-CN">
  <!-- 整个 HTML 文档的开始，lang="zh-CN" 表示页面主要语言是简体中文 -->

  <head>
    <!-- head 部分用于放“页面的配置信息”，这些内容通常不会直接显示在页面正文里 -->

    <meta charset="UTF-8" />
    <!-- 指定字符编码为 UTF-8，防止中文乱码 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 让页面在手机等移动设备上按设备宽度正常缩放，提升响应式显示效果 -->

    <title>云帆书苑 React 版</title>
    <!-- 浏览器标签页上显示的标题 -->
  </head>

  <body>
    <!-- body 部分是真正显示页面内容的区域 -->

    <div id="root"></div>
    <!--
      这是 React 应用的“挂载点”
      后面 main.jsx 会找到这个 id="root" 的 div，
      然后把整个 React 页面渲染到这里
    -->

    <script type="module" src="/src/main.jsx"></script>
    <!--
      加载 /src/main.jsx 这个 JavaScript 模块文件
      type="module" 表示这是 ES 模块，可以使用 import / export
      main.jsx 通常是 React 项目的前端入口文件
    -->
  </body>
</html>
